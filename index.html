<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drum Notation DAW</title>
  <style>
    :root {
      --bg: #0f1318;
      --panel: #171d24;
      --panel-2: #1d2630;
      --border: #2a3441;
      --text: #e8edf3;
      --muted: #9fb0c2;
      --accent: #4ba3ff;
      --accent-2: #80c1ff;
      --warn: #ffd166;
      --step: #24303c;
      --step-active: #4ba3ff;
      --step-current: #ffd166;
      --danger: #ff6b6b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(180deg, #0d1116 0%, #111821 100%);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .app-shell {
      min-height: 100vh;
      padding: 12px;
    }
    .transport-bar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      background: rgba(15, 19, 24, 0.92);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .transport-buttons,
    .transport-controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    button,
    input,
    select {
      font: inherit;
    }
    .primary-button,
    .secondary-button,
    .file-button {
      min-height: 44px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      cursor: pointer;
      color: var(--text);
    }
    .primary-button {
      background: var(--accent);
      color: #081018;
      border-color: transparent;
      font-weight: 700;
    }
    .secondary-button,
    .file-button {
      background: var(--panel-2);
    }
    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 44px;
      padding: 0 10px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .control-label {
      color: var(--muted);
      font-size: 0.92rem;
    }
    .number-input,
    .select-input {
      width: 74px;
      background: transparent;
      border: none;
      color: var(--text);
      outline: none;
    }
    .main-content {
      display: grid;
      gap: 12px;
    }
    .panel {
      background: rgba(23, 29, 36, 0.96);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 10px;
      flex-wrap: wrap;
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--border);
    }
    .panel-header h2 {
      margin: 0;
      font-size: 1.05rem;
    }
    .panel-header p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .grid-scroll,
    .score-scroll,
    .json-area {
      overflow-x: auto;
      padding: 12px;
    }
    .step-header,
    .drum-grid-row {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 8px;
      align-items: center;
      min-width: max-content;
    }
    .step-header {
      margin-bottom: 8px;
    }
    .step-header-label,
    .row-label {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 44px;
      padding: 8px 10px;
      border-radius: 12px;
      background: var(--panel-2);
      border: 1px solid var(--border);
    }
    .row-label-short {
      font-weight: 700;
    }
    .row-label-full,
    .step-header-label {
      color: var(--muted);
      font-size: 0.82rem;
    }
    .step-header-cells,
    .row-cells {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 32px;
      gap: 4px;
    }
    .step-header-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 28px;
      font-size: 0.72rem;
      color: var(--muted);
    }
    .step-cell {
      width: 32px;
      height: 44px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--step);
      cursor: pointer;
      transition: transform 0.08s ease, background 0.15s ease, border-color 0.15s ease;
    }
    .step-cell:active { transform: scale(0.97); }
    .step-cell.active {
      background: var(--step-active);
      border-color: transparent;
    }
    .step-cell.current {
      outline: 2px solid var(--step-current);
      outline-offset: 1px;
    }
    .step-cell.beat { box-shadow: inset 2px 0 0 0 rgba(255,255,255,0.1); }
    .step-cell.measure { box-shadow: inset 3px 0 0 0 rgba(255,209,102,0.45); }
    .status-line {
      padding: 0 14px 14px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .json-textarea {
      width: 100%;
      min-height: 140px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #0f141a;
      color: var(--text);
      padding: 12px;
      line-height: 1.45;
    }
    .json-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding-top: 10px;
    }
    .score-wrap {
      min-width: 320px;
    }
    .hint {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 8px;
    }
    @media (max-width: 640px) {
      .app-shell { padding: 8px; }
      .transport-bar { padding: 10px; }
      .step-header,
      .drum-grid-row { grid-template-columns: 78px 1fr; }
      .row-label-full { display: none; }
      .step-header-cells,
      .row-cells { grid-auto-columns: 34px; }
      .step-cell { width: 34px; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="transport-bar">
      <div class="transport-buttons">
        <button id="playBtn" class="primary-button">再生</button>
        <button id="stopBtn" class="secondary-button">停止</button>
        <button id="clearBtn" class="secondary-button">全消去</button>
      </div>
      <div class="transport-controls">
        <label class="control-group">
          <span class="control-label">BPM</span>
          <input id="bpmInput" class="number-input" type="number" min="40" max="240" value="110" />
        </label>
        <label class="control-group">
          <span class="control-label">小節</span>
          <select id="measureSelect" class="select-input">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
          </select>
        </label>
        <button id="saveJsonBtn" class="secondary-button">JSON保存</button>
        <button id="downloadHtmlBtn" class="secondary-button">HTML保存</button>
        <button id="midiBtn" class="secondary-button">MIDI書き出し</button>
        <label class="file-button">
          JSON読込
          <input id="jsonFileInput" type="file" accept="application/json,.json" hidden />
        </label>
      </div>
    </header>

    <main class="main-content">
      <section class="panel">
        <div class="panel-header">
          <h2>ドラムグリッド</h2>
          <p>4/4固定 / 16分グリッド / スマホ操作対応</p>
        </div>
        <div class="grid-scroll">
          <div id="gridRoot"></div>
        </div>
        <div id="statusLine" class="status-line"></div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>簡易ドラム譜</h2>
          <p>Kick / Snare は下側、Hi-Hat / Crash は上側</p>
        </div>
        <div class="score-scroll">
          <div class="score-wrap">
            <svg id="scoreSvg" width="320" height="220" role="img" aria-label="簡易ドラム譜"></svg>
          </div>
          <div class="hint">MVPのため、装飾音符・スウィング・ゴーストノート・本格記譜は未対応です。</div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>JSON</h2>
          <p>ここに貼り付けて復元もできます</p>
        </div>
        <div class="json-area">
          <textarea id="jsonTextarea" class="json-textarea"></textarea>
          <div class="json-actions">
            <button id="applyJsonBtn" class="secondary-button">このJSONを適用</button>
            <button id="copyJsonBtn" class="secondary-button">JSONをコピー</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const STORAGE_KEY = 'drum-notation-daw-html-pattern';
    const STEPS_PER_MEASURE = 16;
    const INSTRUMENTS = [
      { id: 'kick', label: 'Kick', short: 'K', scoreY: 126, midiNote: 36, voice: 'lower' },
      { id: 'snare', label: 'Snare', short: 'S', scoreY: 94, midiNote: 38, voice: 'lower' },
      { id: 'closed_hihat', label: 'Closed Hi-Hat', short: 'CH', scoreY: 54, midiNote: 42, voice: 'upper', xHead: true },
      { id: 'open_hihat', label: 'Open Hi-Hat', short: 'OH', scoreY: 42, midiNote: 46, voice: 'upper', xHead: true },
      { id: 'crash', label: 'Crash', short: 'CR', scoreY: 30, midiNote: 49, voice: 'upper', xHead: true }
    ];

    const DEFAULT_PATTERN = {
      bpm: 110,
      timeSignature: '4/4',
      measures: 1,
      gridResolution: 16,
      events: [
        { step: 0, instrument: 'kick', velocity: 110 },
        { step: 8, instrument: 'kick', velocity: 110 },
        { step: 4, instrument: 'snare', velocity: 100 },
        { step: 12, instrument: 'snare', velocity: 100 },
        { step: 0, instrument: 'closed_hihat', velocity: 80 },
        { step: 2, instrument: 'closed_hihat', velocity: 80 },
        { step: 4, instrument: 'closed_hihat', velocity: 80 },
        { step: 6, instrument: 'closed_hihat', velocity: 80 },
        { step: 8, instrument: 'closed_hihat', velocity: 80 },
        { step: 10, instrument: 'closed_hihat', velocity: 80 },
        { step: 12, instrument: 'closed_hihat', velocity: 80 },
        { step: 14, instrument: 'closed_hihat', velocity: 80 }
      ]
    };

    const state = {
      pattern: loadPattern(),
      isPlaying: false,
      currentStep: 0,
      audioContext: null,
      nextNoteTime: 0,
      scheduleAheadTime: 0.1,
      lookahead: 25,
      schedulerInterval: null
    };

    const gridRoot = document.getElementById('gridRoot');
    const scoreSvg = document.getElementById('scoreSvg');
    const statusLine = document.getElementById('statusLine');
    const bpmInput = document.getElementById('bpmInput');
    const measureSelect = document.getElementById('measureSelect');
    const jsonTextarea = document.getElementById('jsonTextarea');
    const jsonFileInput = document.getElementById('jsonFileInput');

    function clampMeasures(value) { return Math.max(1, Math.min(4, Number(value) || 1)); }
    function clampBpm(value) { return Math.max(40, Math.min(240, Number(value) || 110)); }

    function trimEvents(events, measures) {
      const maxSteps = measures * STEPS_PER_MEASURE;
      return events.filter(e => e.step < maxSteps).sort((a, b) => a.step - b.step);
    }

    function normalizePattern(input) {
      const measures = clampMeasures(input.measures);
      return {
        bpm: clampBpm(input.bpm),
        timeSignature: '4/4',
        measures,
        gridResolution: 16,
        events: trimEvents(Array.isArray(input.events) ? input.events : [], measures)
      };
    }

    function loadPattern() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return structuredClone(DEFAULT_PATTERN);
        return normalizePattern(JSON.parse(raw));
      } catch {
        return structuredClone(DEFAULT_PATTERN);
      }
    }

    function savePattern() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.pattern));
      jsonTextarea.value = JSON.stringify(state.pattern, null, 2);
    }

    function totalSteps() {
      return state.pattern.measures * STEPS_PER_MEASURE;
    }

    function isActive(instrument, step) {
      return state.pattern.events.some(e => e.instrument === instrument && e.step === step);
    }

    function toggleStep(instrument, step) {
      const exists = isActive(instrument, step);
      if (exists) {
        state.pattern.events = state.pattern.events.filter(
          e => !(e.instrument === instrument && e.step === step)
        );
      } else {
        state.pattern.events.push({ step, instrument, velocity: 100 });
        state.pattern.events.sort((a, b) => a.step - b.step);
      }
      savePattern();
      renderAll();
    }

    function setMeasures(measures) {
      state.pattern.measures = clampMeasures(measures);
      state.pattern.events = trimEvents(state.pattern.events, state.pattern.measures);
      if (state.currentStep >= totalSteps()) state.currentStep = 0;
      savePattern();
      renderAll();
    }

    function setBpm(bpm) {
      state.pattern.bpm = clampBpm(bpm);
      savePattern();
      renderStatus();
    }

    function clearAll() {
      stopPlayback();
      state.pattern.events = [];
      savePattern();
      renderAll();
    }

    function renderGrid() {
      const total = totalSteps();
      let html = '';

      html += '<div class="step-header">';
      html += '<div class="step-header-label">Inst</div>';
      html += '<div class="step-header-cells">';
      for (let step = 0; step < total; step++) {
        html += `<div class="step-header-cell">${(step % 4) + 1}</div>`;
      }
      html += '</div></div>';

      for (const inst of INSTRUMENTS) {
        html += '<div class="drum-grid-row">';
        html += `<div class="row-label"><span class="row-label-short">${inst.short}</span><span class="row-label-full">${inst.label}</span></div>`;
        html += '<div class="row-cells">';
        for (let step = 0; step < total; step++) {
          const classes = ['step-cell'];
          if (isActive(inst.id, step)) classes.push('active');
          if (state.currentStep === step && state.isPlaying) classes.push('current');
          if (step % 4 === 0) classes.push('beat');
          if (step % STEPS_PER_MEASURE === 0) classes.push('measure');
          html += `<button class="${classes.join(' ')}" data-inst="${inst.id}" data-step="${step}" aria-label="${inst.label} step ${step + 1}"></button>`;
        }
        html += '</div></div>';
      }

      gridRoot.innerHTML = html;
      gridRoot.querySelectorAll('.step-cell').forEach(button => {
        button.addEventListener('click', () => {
          toggleStep(button.dataset.inst, Number(button.dataset.step));
        });
      });
    }

    function renderStatus() {
      statusLine.textContent = `BPM ${state.pattern.bpm} / ${state.pattern.measures}小節 / ノート数 ${state.pattern.events.length}`;
    }

    function renderScore() {
      const measures = state.pattern.measures;
      const measureWidth = 260;
      const svgWidth = Math.max(320, measures * measureWidth + 24);
      const svgHeight = 220;
      scoreSvg.setAttribute('width', svgWidth);
      scoreSvg.setAttribute('height', svgHeight);
      scoreSvg.innerHTML = '';

      const ns = 'http://www.w3.org/2000/svg';
      const lineYs = [46, 62, 78, 94, 110];
      const create = (tag, attrs = {}) => {
        const el = document.createElementNS(ns, tag);
        for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, String(v));
        return el;
      };

      for (let m = 0; m < measures; m++) {
        const x = 12 + m * measureWidth;
        const startStep = m * STEPS_PER_MEASURE;
        const endX = x + measureWidth - 18;

        for (const y of lineYs) {
          scoreSvg.appendChild(create('line', {
            x1: x,
            y1: y,
            x2: endX,
            y2: y,
            stroke: '#bfcad6',
            'stroke-width': 1
          }));
        }

        scoreSvg.appendChild(create('line', {
          x1: x,
          y1: lineYs[0],
          x2: x,
          y2: 126,
          stroke: '#d8e1ea',
          'stroke-width': m === 0 ? 2 : 1
        }));

        scoreSvg.appendChild(create('line', {
          x1: endX,
          y1: lineYs[0],
          x2: endX,
          y2: 126,
          stroke: '#d8e1ea',
          'stroke-width': 1
        }));

        for (let localStep = 0; localStep < STEPS_PER_MEASURE; localStep++) {
          const absoluteStep = startStep + localStep;
          const events = state.pattern.events.filter(e => e.step === absoluteStep);
          const noteX = x + 14 + localStep * 14.2;

          if (localStep % 4 === 0) {
            scoreSvg.appendChild(create('line', {
              x1: noteX - 6,
              y1: 34,
              x2: noteX - 6,
              y2: 126,
              stroke: 'rgba(255,255,255,0.08)',
              'stroke-width': 1
            }));
          }

          if (!events.length) {
            scoreSvg.appendChild(create('rect', {
              x: noteX - 2,
              y: 83,
              width: 4,
              height: 4,
              rx: 1.2,
              fill: '#7f8d9d'
            }));
            continue;
          }

          for (const event of events) {
            const inst = INSTRUMENTS.find(i => i.id === event.instrument);
            if (!inst) continue;
            const y = inst.scoreY;

            if (inst.xHead) {
              scoreSvg.appendChild(create('line', {
                x1: noteX - 4,
                y1: y - 4,
                x2: noteX + 4,
                y2: y + 4,
                stroke: '#e8edf3',
                'stroke-width': 1.6
              }));
              scoreSvg.appendChild(create('line', {
                x1: noteX + 4,
                y1: y - 4,
                x2: noteX - 4,
                y2: y + 4,
                stroke: '#e8edf3',
                'stroke-width': 1.6
              }));
            } else {
              scoreSvg.appendChild(create('ellipse', {
                cx: noteX,
                cy: y,
                rx: 5.3,
                ry: 3.8,
                fill: '#e8edf3'
              }));
            }

            const stemUp = inst.voice === 'upper';
            scoreSvg.appendChild(create('line', {
              x1: noteX + (stemUp ? 5 : -5),
              y1: y,
              x2: noteX + (stemUp ? 5 : -5),
              y2: stemUp ? y - 22 : y + 22,
              stroke: '#e8edf3',
              'stroke-width': 1.2
            }));
          }
        }
      }
    }

    function renderAll() {
      bpmInput.value = state.pattern.bpm;
      measureSelect.value = state.pattern.measures;
      renderGrid();
      renderScore();
      renderStatus();
      jsonTextarea.value = JSON.stringify(state.pattern, null, 2);
    }

    function ensureAudio() {
      if (!state.audioContext) {
        state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (state.audioContext.state === 'suspended') {
        return state.audioContext.resume();
      }
      return Promise.resolve();
    }

    function playInstrument(instrumentId, time, velocity = 0.8) {
      const ctx = state.audioContext;
      if (!ctx) return;

      if (instrumentId === 'kick') {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(140, time);
        osc.frequency.exponentialRampToValueAtTime(45, time + 0.12);
        gain.gain.setValueAtTime(velocity * 0.8, time);
        gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.18);
        osc.connect(gain).connect(ctx.destination);
        osc.start(time);
        osc.stop(time + 0.2);
        return;
      }

      if (instrumentId === 'snare') {
        const bufferSize = ctx.sampleRate * 0.12;
        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        const noise = ctx.createBufferSource();
        noise.buffer = buffer;
        const filter = ctx.createBiquadFilter();
        filter.type = 'highpass';
        filter.frequency.value = 1200;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(velocity * 0.6, time);
        gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.12);
        noise.connect(filter).connect(gain).connect(ctx.destination);
        noise.start(time);
        noise.stop(time + 0.13);
        return;
      }

      const bufferSize = ctx.sampleRate * (instrumentId === 'crash' ? 0.45 : instrumentId === 'open_hihat' ? 0.25 : 0.08);
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
      const noise = ctx.createBufferSource();
      noise.buffer = buffer;
      const filter = ctx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = instrumentId === 'crash' ? 5500 : 8000;
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(velocity * (instrumentId === 'crash' ? 0.4 : 0.28), time);
      gain.gain.exponentialRampToValueAtTime(0.0001, time + (instrumentId === 'crash' ? 0.4 : instrumentId === 'open_hihat' ? 0.22 : 0.06));
      noise.connect(filter).connect(gain).connect(ctx.destination);
      noise.start(time);
      noise.stop(time + (instrumentId === 'crash' ? 0.45 : instrumentId === 'open_hihat' ? 0.25 : 0.08));
    }

    function secondsPerStep() {
      return 60 / state.pattern.bpm / 4;
    }

    function scheduler() {
      const ctx = state.audioContext;
      if (!ctx || !state.isPlaying) return;

      while (state.nextNoteTime < ctx.currentTime + state.scheduleAheadTime) {
        const step = state.currentStep;
        const events = state.pattern.events.filter(e => e.step === step);
        for (const event of events) {
          playInstrument(event.instrument, state.nextNoteTime, Math.max(0.3, Math.min(1, event.velocity / 127)));
        }

        const drawStep = step;
        const delay = Math.max(0, (state.nextNoteTime - ctx.currentTime) * 1000);
        setTimeout(() => {
          if (!state.isPlaying) return;
          state.currentStep = drawStep;
          renderGrid();
        }, delay);

        state.nextNoteTime += secondsPerStep();
        state.currentStep = (state.currentStep + 1) % totalSteps();
      }
    }

    async function startPlayback() {
      if (state.isPlaying) return;
      await ensureAudio();
      state.isPlaying = true;
      state.currentStep = 0;
      state.nextNoteTime = state.audioContext.currentTime + 0.05;
      renderGrid();
      state.schedulerInterval = setInterval(scheduler, state.lookahead);
    }

    function stopPlayback() {
      state.isPlaying = false;
      if (state.schedulerInterval) clearInterval(state.schedulerInterval);
      state.schedulerInterval = null;
      state.currentStep = 0;
      renderGrid();
    }

    function downloadJson() {
      const blob = new Blob([JSON.stringify(state.pattern, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'drum-pattern.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    function downloadHtml() {
      const blob = new Blob([document.documentElement.outerHTML], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'drum-notation-daw.html';
      a.click();
      URL.revokeObjectURL(url);
    }

    function applyJsonText() {
      try {
        const parsed = JSON.parse(jsonTextarea.value);
        state.pattern = normalizePattern(parsed);
        stopPlayback();
        savePattern();
        renderAll();
      } catch {
        alert('JSONの形式が正しくありません。');
      }
    }

    async function loadJsonFile(file) {
      try {
        const text = await file.text();
        const parsed = JSON.parse(text);
        state.pattern = normalizePattern(parsed);
        stopPlayback();
        savePattern();
        renderAll();
      } catch {
        alert('JSON読み込みに失敗しました。');
      }
    }

    async function copyJson() {
      try {
        await navigator.clipboard.writeText(jsonTextarea.value);
      } catch {
        jsonTextarea.select();
        document.execCommand('copy');
      }
    }

    function encodeVarLen(value) {
      let buffer = value & 0x7f;
      const bytes = [];
      while ((value >>= 7)) {
        buffer <<= 8;
        buffer |= (value & 0x7f) | 0x80;
      }
      while (true) {
        bytes.push(buffer & 0xff);
        if (buffer & 0x80) buffer >>= 8; else break;
      }
      return bytes;
    }

    function numberToBytes(value, length) {
      const bytes = new Array(length).fill(0);
      for (let i = length - 1; i >= 0; i--) {
        bytes[i] = value & 0xff;
        value >>= 8;
      }
      return bytes;
    }

    function stringToBytes(value) {
      return Array.from(value).map(ch => ch.charCodeAt(0));
    }

    function exportMidi() {
      const TICKS_PER_QUARTER = 480;
      const STEP_TICKS = TICKS_PER_QUARTER / 4;
      const NOTE_LENGTH = 90;
      const midiEvents = [];
      const microsecondsPerQuarter = Math.round(60000000 / state.pattern.bpm);

      midiEvents.push({ tick: 0, data: [0xff, 0x51, 0x03, ...numberToBytes(microsecondsPerQuarter, 3)] });

      for (const event of state.pattern.events) {
        const inst = INSTRUMENTS.find(i => i.id === event.instrument);
        if (!inst) continue;
        const start = event.step * STEP_TICKS;
        const end = start + NOTE_LENGTH;
        const velocity = Math.max(1, Math.min(127, event.velocity || 100));
        midiEvents.push({ tick: start, data: [0x99, inst.midiNote, velocity] });
        midiEvents.push({ tick: end, data: [0x89, inst.midiNote, 0x00] });
      }

      midiEvents.push({ tick: totalSteps() * STEP_TICKS + 1, data: [0xff, 0x2f, 0x00] });
      midiEvents.sort((a, b) => a.tick - b.tick);

      const trackBytes = [];
      let prevTick = 0;
      for (const event of midiEvents) {
        const delta = event.tick - prevTick;
        trackBytes.push(...encodeVarLen(delta), ...event.data);
        prevTick = event.tick;
      }

      const header = [
        ...stringToBytes('MThd'),
        ...numberToBytes(6, 4),
        ...numberToBytes(0, 2),
        ...numberToBytes(1, 2),
        ...numberToBytes(TICKS_PER_QUARTER, 2)
      ];

      const track = [
        ...stringToBytes('MTrk'),
        ...numberToBytes(trackBytes.length, 4),
        ...trackBytes
      ];

      const bytes = new Uint8Array([...header, ...track]);
      const blob = new Blob([bytes], { type: 'audio/midi' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'drum-pattern.mid';
      a.click();
      URL.revokeObjectURL(url);
    }

    document.getElementById('playBtn').addEventListener('click', startPlayback);
    document.getElementById('stopBtn').addEventListener('click', stopPlayback);
    document.getElementById('clearBtn').addEventListener('click', clearAll);
    document.getElementById('saveJsonBtn').addEventListener('click', downloadJson);
    document.getElementById('downloadHtmlBtn').addEventListener('click', downloadHtml);
    document.getElementById('midiBtn').addEventListener('click', exportMidi);
    document.getElementById('applyJsonBtn').addEventListener('click', applyJsonText);
    document.getElementById('copyJsonBtn').addEventListener('click', copyJson);

    bpmInput.addEventListener('change', () => setBpm(bpmInput.value));
    measureSelect.addEventListener('change', () => setMeasures(measureSelect.value));
    jsonFileInput.addEventListener('change', (e) => {
      const file = e.target.files && e.target.files[0];
      if (file) loadJsonFile(file);
      e.target.value = '';
    });

    renderAll();
    savePattern();
  </script>
</body>
